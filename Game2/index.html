<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matching Game</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: sans-serif;
  background: #f4efe8;
}

/* MAIN LAYOUT */
.app {
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 8px;
  padding: 8px;
}

/* TOP CONTROLS */
.controls {
  display: grid;
  grid-template-columns: auto auto 1fr;
  gap: 10px;
  align-items: center;
}

/* BUTTON */
button {
  padding: 10px 16px;
  border-radius: 20px;
  border: none;
  background: #242c68;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* SLIDER */
.slider {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}

/* BOARD */
.board {
  height: 100%;
  display: grid;
  gap: 10px;
}

/* responsive grid */
@media (min-width: 900px) {
  .board { grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(2, 1fr); }
}
@media (max-width: 899px) {
  .board { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); }
}
@media (max-width: 600px) {
  .board { grid-template-columns: repeat(3, 1fr); }
}

/* CARD */
.card {
  perspective: 1000px;
  width: 100%;
  height: 100%;
}

.card-inner {
  width: 100%;
  height: 100%;
  transition: 0.5s;
  transform-style: preserve-3d;
}

.card.is-flipped .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
  overflow: hidden;
}

/* FRONT IMAGE (HIGH QUALITY) */
.card-front {
  transform: rotateY(180deg);
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ⭐ KEY: FULL IMAGE + HIGH RES */
.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 8px;
  image-rendering: auto;
}

/* BACK */
.card-back {
  background: #6f4a92;
}
</style>
</head>

<body>

<div class="app">

  <div class="controls">
    <button onclick="preview()">Preview</button>
    <button onclick="restart()">Restart</button>

    <div class="slider">
      🎵
      <input type="range" id="musicVol" min="0" max="100" value="50">
    </div>

    <div class="slider">
      🔊
      <input type="range" id="effectVol" min="0" max="100" value="50">
    </div>
  </div>

  <div class="board" id="board"></div>

</div>

<audio id="music" src="./Song.mp3" loop></audio>

<script>
const TOTAL = 7;
const BACK = "./BacksideCover.png";

let cards = [];
let first = null;
let lock = false;
let effectVolume = 0.05;

/* CREATE DATA */
const data = [];
for (let i = 1; i <= TOTAL; i++) {
  data.push(
    { id: i, type: "IMG", src: `./${i}IMG.png` },
    { id: i, type: "DESC", src: `./${i}DESC.png` }
  );
}

/* SHUFFLE */
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

/* CREATE CARD */
function createCard(d) {
  const el = document.createElement("div");
  el.className = "card";

  el.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back">
        <img src="${BACK}">
      </div>
      <div class="card-face card-front">
        <img src="${d.src}">
      </div>
    </div>
  `;

  el.onclick = () => clickCard(el, d);
  return el;
}

/* CLICK */
function clickCard(el, d) {
  if (lock || el.classList.contains("is-flipped")) return;

  playClick();

  el.classList.add("is-flipped");

  if (!first) {
    first = { el, d };
    return;
  }

  if (first.d.id === d.id && first.d.type !== d.type) {
    playMatch();
    first = null;
  } else {
    playWrong();
    lock = true;
    setTimeout(() => {
      el.classList.remove("is-flipped");
      first.el.classList.remove("is-flipped");
      first = null;
      lock = false;
    }, 700);
  }
}

/* PREVIEW */
function preview() {
  cards.forEach(c => c.classList.add("is-flipped"));
  setTimeout(() => {
    cards.forEach(c => c.classList.remove("is-flipped"));
  }, 4000);
}

/* RENDER */
function render() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  cards = shuffle([...data]).map(d => createCard(d));
  cards.forEach(c => board.appendChild(c));
}

/* RESTART */
function restart() {
  first = null;
  lock = false;
  render();
}

/* MUSIC */
const music = document.getElementById("music");
document.body.addEventListener("click", () => {
  music.play().catch(()=>{});
}, { once: true });

document.getElementById("musicVol").oninput = e => {
  music.volume = e.target.value / 100;
};

/* EFFECT SOUND */
const ctx = new (window.AudioContext || window.webkitAudioContext)();

document.getElementById("effectVol").oninput = e => {
  effectVolume = e.target.value / 1000;
};

function beep(freq, dur=0.1) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.frequency.value = freq;
  g.gain.value = effectVolume;
  o.connect(g);
  g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime + dur);
}

function playClick(){ beep(500,0.05); }
function playMatch(){ beep(700); }
function playWrong(){ beep(200); }

/* START */
render();
</script>

</body>
</html>
