<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Australian Table Grapes Matching Game</title>
  <style>
    :root {
      --bg: #f3eee7;
      --panel: rgba(255, 255, 255, 0.76);
      --panel-border: rgba(42, 45, 95, 0.08);
      --ink: #232b67;
      --muted: #606785;
      --primary: #242c68;
      --purple: #6f4a92;
      --purple-dark: #5a397b;
      --success: #2f7d57;
      --shadow: 0 16px 40px rgba(42, 33, 58, 0.10);
      --card-shadow: 0 10px 24px rgba(34, 28, 49, 0.14);
      --radius-xl: 28px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --board-max: 1500px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(229, 206, 181, 0.95), transparent 28%),
        linear-gradient(180deg, #f6f1ea 0%, #f1ece4 100%);
      color: var(--ink);
    }

    body {
      padding: 20px;
    }

    .app {
      max-width: var(--board-max);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.55fr 1fr;
      gap: 18px;
    }

    .hero,
    .status-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .hero {
      min-height: 168px;
      padding: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .hero-copy h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 2vw + 1.2rem, 3.1rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      font-weight: 800;
      color: var(--primary);
    }

    .hero-copy p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 0.4vw + 0.95rem, 1.15rem);
      line-height: 1.45;
      max-width: 40rem;
    }

    .brand-chip {
      width: clamp(150px, 14vw, 210px);
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, var(--purple), var(--purple-dark));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .brand-chip img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-panel {
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: center;
    }

    .stat {
      min-height: 88px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(42, 45, 95, 0.08);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .stat-value {
      color: var(--primary);
      font-size: clamp(1.35rem, 1vw + 1rem, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      padding: 0 2px;
    }

    .instruction {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ui-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 13px 20px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .ui-btn:hover {
      transform: translateY(-1px);
    }

    .ui-btn:active {
      transform: translateY(0);
    }

    .ui-btn.primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 22px rgba(36, 44, 104, 0.18);
    }

    .ui-btn.secondary {
      background: rgba(255,255,255,0.75);
      color: var(--primary);
      border: 1px solid rgba(42, 45, 95, 0.10);
    }

    .board-wrap {
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(42, 45, 95, 0.07);
      border-radius: 30px;
      padding: clamp(14px, 2vw, 22px);
      box-shadow: var(--shadow);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: clamp(10px, 1vw, 16px);
    }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
      border-radius: 22px;
      perspective: 1200px;
      -webkit-tap-highlight-color: transparent;
    }

    .card:focus-visible {
      outline: 3px solid rgba(76, 115, 255, 0.4);
      outline-offset: 4px;
    }

    .card.is-matched {
      cursor: default;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(.2,.7,.2,1), box-shadow 0.25s ease;
      box-shadow: var(--card-shadow);
    }

    .card:hover .card-inner {
      box-shadow: 0 16px 28px rgba(34, 28, 49, 0.18);
    }

    .card.is-flipped .card-inner,
    .card.is-matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid rgba(42, 45, 95, 0.08);
      display: block;
    }

    .card-back {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.04)),
        var(--purple);
    }

    .card-back::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 22%),
        radial-gradient(circle at 80% 75%, rgba(255,255,255,0.06), transparent 20%);
      z-index: 1;
      pointer-events: none;
    }

    .card-front {
      transform: rotateY(180deg);
      background: #fff;
    }

    .card-face img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .card-back img {
      object-fit: cover;
      background: linear-gradient(180deg, var(--purple), var(--purple-dark));
    }

    .card-front img {
      object-fit: cover;
      background: #ece6dd;
    }

    .card.is-matched .card-front {
      box-shadow: inset 0 0 0 3px rgba(47, 125, 87, 0.24);
    }

    .win-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 16px;
      background: linear-gradient(180deg, rgba(47,125,87,0.12), rgba(47,125,87,0.06));
      border: 1px solid rgba(47,125,87,0.18);
      color: #1d4c35;
      border-radius: 22px;
      padding: 16px 18px;
    }

    .win-banner.show {
      display: flex;
    }

    .win-banner strong {
      display: block;
      font-size: 1.06rem;
      margin-bottom: 4px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(31, 37, 82, 0.96);
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      box-shadow: 0 14px 28px rgba(21, 20, 35, 0.22);
      z-index: 100;
      max-width: calc(100vw - 24px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1180px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .board {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 14px;
      }

      .hero {
        flex-direction: column;
        align-items: flex-start;
        min-height: auto;
        padding: 20px;
      }

      .board {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .status-panel {
        grid-template-columns: 1fr;
      }

      .board {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .button-row {
        width: 100%;
      }

      .button-row .ui-btn {
        width: 100%;
      }

      .win-banner {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card-inner,
      .toast,
      .ui-btn {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="hero">
        <div class="hero-copy">
          <h1>Australian Table Grapes<br>Matching Game</h1>
          <p>Match each grape description card with its matching grape image card.</p>
        </div>
        <div class="brand-chip" aria-hidden="true">
          <img src="./BacksideCover.png" alt="">
        </div>
      </div>

      <aside class="status-panel" aria-label="Game status">
        <div class="stat">
          <div class="stat-label">Moves</div>
          <div class="stat-value" id="movesValue">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Matches</div>
          <div class="stat-value" id="matchesValue">0 / 7</div>
        </div>
        <div class="stat">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="timeValue">00:00</div>
        </div>
      </aside>
    </section>

    <section class="controls">
      <div class="instruction">
        Tap or click two cards. A match is one description card and one image card with the same number.
      </div>
      <div class="button-row">
        <button class="ui-btn secondary" id="previewBtn" type="button">Preview for 4 seconds</button>
        <button class="ui-btn primary" id="restartBtn" type="button">Shuffle & Restart</button>
      </div>
    </section>

    <section class="board-wrap">
      <div class="board" id="board" aria-label="Matching game board"></div>

      <div class="win-banner" id="winBanner">
        <div>
          <strong>Well done — all pairs matched.</strong>
          <span id="winText">You finished the board.</span>
        </div>
        <button class="ui-btn primary" id="playAgainBtn" type="button">Play Again</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const TOTAL_PAIRS = 7;
    const BACK_IMAGE = "./BacksideCover.png";

    const sourceCards = Array.from({ length: TOTAL_PAIRS }, (_, index) => {
      const id = index + 1;
      return [
        { id, kind: "IMG", src: `./${id}IMG.png`, label: `Grape image ${id}` },
        { id, kind: "DESC", src: `./${id}DESC.png`, label: `Grape description ${id}` }
      ];
    }).flat();

    const boardEl = document.getElementById("board");
    const movesValueEl = document.getElementById("movesValue");
    const matchesValueEl = document.getElementById("matchesValue");
    const timeValueEl = document.getElementById("timeValue");
    const toastEl = document.getElementById("toast");
    const winBannerEl = document.getElementById("winBanner");
    const winTextEl = document.getElementById("winText");
    const restartBtn = document.getElementById("restartBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const previewBtn = document.getElementById("previewBtn");

    let cards = [];
    let firstPick = null;
    let secondPick = null;
    let locked = false;
    let moves = 0;
    let matches = 0;
    let seconds = 0;
    let timerId = null;
    let gameStarted = false;
    let previewing = false;

    function shuffle(array) {
      const cloned = [...array];
      for (let i = cloned.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
      }
      return cloned;
    }

    function formatTime(totalSeconds) {
      const mins = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
      const secs = (totalSeconds % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function updateStats() {
      movesValueEl.textContent = String(moves);
      matchesValueEl.textContent = `${matches} / ${TOTAL_PAIRS}`;
      timeValueEl.textContent = formatTime(seconds);
    }

    function startTimer() {
      if (timerId) return;
      timerId = window.setInterval(() => {
        seconds += 1;
        updateStats();
      }, 1000);
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(showToast._timeout);
      showToast._timeout = setTimeout(() => {
        toastEl.classList.remove("show");
      }, 1600);
    }

    function makeCard(cardData, index) {
      const card = document.createElement("button");
      card.className = "card";
      card.type = "button";
      card.dataset.id = String(cardData.id);
      card.dataset.kind = cardData.kind;
      card.dataset.index = String(index);
      card.setAttribute("aria-label", "Hidden card");

      card.innerHTML = `
        <span class="sr-only">${cardData.label}</span>
        <div class="card-inner">
          <div class="card-face card-back" aria-hidden="true">
            <img src="${BACK_IMAGE}" alt="" onerror="this.style.display='none'">
          </div>
          <div class="card-face card-front">
            <img
              src="${cardData.src}"
              alt="${cardData.label}"
              loading="lazy"
              draggable="false"
              onerror="this.alt='Image failed to load'; this.style.objectFit='contain'; this.style.padding='10px';"
            >
          </div>
        </div>
      `;

      card.addEventListener("click", () => handleCardClick(card));

      return card;
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      const shuffled = shuffle(sourceCards);
      cards = shuffled.map((cardData, index) => makeCard(cardData, index));
      cards.forEach(card => boardEl.appendChild(card));
    }

    function flipUp(card) {
      card.classList.add("is-flipped");
      card.setAttribute("aria-label", `Revealed ${card.dataset.kind} card ${card.dataset.id}`);
    }

    function flipDown(card) {
      card.classList.remove("is-flipped");
      card.setAttribute("aria-label", "Hidden card");
    }

    function markMatched(cardA, cardB) {
      cardA.classList.add("is-matched");
      cardB.classList.add("is-matched");
      cardA.disabled = true;
      cardB.disabled = true;
    }

    function isMatch(cardA, cardB) {
      return cardA.dataset.id === cardB.dataset.id && cardA.dataset.kind !== cardB.dataset.kind;
    }

    function checkWin() {
      if (matches === TOTAL_PAIRS) {
        stopTimer();
        winTextEl.textContent = `Completed in ${moves} moves and ${formatTime(seconds)}.`;
        winBannerEl.classList.add("show");
        showToast("Board completed");
      }
    }

    function resetTurn() {
      firstPick = null;
      secondPick = null;
      locked = false;
    }

    function handleCardClick(card) {
      if (locked || previewing) return;
      if (card.classList.contains("is-flipped") || card.classList.contains("is-matched")) return;

      if (!gameStarted) {
        gameStarted = true;
        startTimer();
      }

      flipUp(card);

      if (!firstPick) {
        firstPick = card;
        return;
      }

      secondPick = card;
      locked = true;
      moves += 1;
      updateStats();

      if (isMatch(firstPick, secondPick)) {
        markMatched(firstPick, secondPick);
        matches += 1;
        updateStats();
        showToast("Match found");
        resetTurn();
        checkWin();
      } else {
        setTimeout(() => {
          flipDown(firstPick);
          flipDown(secondPick);
          resetTurn();
        }, 850);
      }
    }

    function previewAll() {
      if (previewing || gameStarted) return;
      previewing = true;
      cards.forEach(card => flipUp(card));
      showToast("Previewing all cards");

      setTimeout(() => {
        cards.forEach(card => flipDown(card));
        previewing = false;
      }, 4000);
    }

    function restartGame() {
      stopTimer();
      firstPick = null;
      secondPick = null;
      locked = false;
      moves = 0;
      matches = 0;
      seconds = 0;
      gameStarted = false;
      previewing = false;
      winBannerEl.classList.remove("show");
      updateStats();
      renderBoard();
    }

    restartBtn.addEventListener("click", restartGame);
    playAgainBtn.addEventListener("click", restartGame);
    previewBtn.addEventListener("click", previewAll);

    window.addEventListener("load", () => {
      updateStats();
      renderBoard();
    });
  </script>
</body>
</html>
